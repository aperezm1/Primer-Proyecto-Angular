<nav>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">
      {{ 'NAV.HOME' | translate }}
    </a>
    |
    <a routerLink="about" routerLinkActive="activo">
      {{ 'NAV.ABOUT' | translate }}
    </a>
    |
    <a routerLink="contact" routerLinkActive="activo">
      {{ 'NAV.CONTACT' | translate }}
    </a>
  </div>

  <div class="lang-select">
  <img [src]="'../../assets/flags/' + currentLang + '.svg'" [alt]="currentLang" width="24" height="16" class="flag-img" />
  <select [(ngModel)]="currentLang" (change)="changeLang(currentLang)" aria-label="Language selector">
    <option value="es">ES</option>
    <option value="en">EN</option>
  </select>
</div>
</nav>
