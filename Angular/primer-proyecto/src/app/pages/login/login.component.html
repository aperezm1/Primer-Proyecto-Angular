<div class="login-container">
  <h1>Iniciar sesión</h1>

  <form (ngSubmit)="login()">
    <input
      type="text"
      [(ngModel)]="username"
      name="username"
      placeholder="Usuario"
      required
    />

    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      placeholder="Contraseña"
      required
    />

    <button type="submit">Entrar</button>

    @if (error) {
      <p class="error">{{ error }}</p>
    }
  </form>
</div>
