<div class="about-container">
  <div class="h1-row">
    <h1>{{ 'ABOUT.USERS_TITLE' | translate }}</h1>
  </div>

  <div class="filters-row">
    <input
      type="text"
      [placeholder]="'ABOUT.FILTER_PLACEHOLDER' | translate"
      [value]="filterText()"
      (input)="onFilterChange($event)"
      class="filter-input"
    />

    <select
      class="filter-select"
      [value]="selectedCity()"
      (change)="onCityChange($event)"
    >
      <option value="">{{ 'ABOUT.ALL_CITIES' | translate }}</option>
      @for (city of cities(); track city) {
        <option [value]="city">{{ city }}</option>
      }
    </select>

    <button type="button" class="reset-btn" (click)="resetFilters()">
      {{ 'ABOUT.CLEAR_FILTERS' | translate }}
    </button>
  </div>

  <table mat-table [dataSource]="filteredUsers()" class="mat-elevation-z8">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>{{ 'ABOUT.TABLE_ID' | translate }}</th>
      <td mat-cell *matCellDef="let user">{{ user.id }}</td>
    </ng-container>

    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>{{ 'ABOUT.TABLE_USERNAME' | translate }}</th>
      <td mat-cell *matCellDef="let user">{{ user.username }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>{{ 'ABOUT.TABLE_EMAIL' | translate }}</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef>{{ 'ABOUT.TABLE_PHONE' | translate }}</th>
      <td mat-cell *matCellDef="let user">{{ user.phone }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="clickable-row"
      (click)="goToUserDetail(row.id)"
      (keyup.enter)="goToUserDetail(row.id)"
      tabindex="0"
    ></tr>
  </table>
</div>
