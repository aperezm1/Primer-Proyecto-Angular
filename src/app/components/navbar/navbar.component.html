<nav>
  <div class="lang-select">
    <img [src]="'assets/flags/' + currentLang + '.svg'" [alt]="currentLang" class="flag-img" />
    
    <select [(ngModel)]="currentLang" (change)="changeLang(currentLang)">
      <option value="es">ES</option>
      <option value="en">EN</option>
    </select>
  </div>

  <div class="nav-links">
    <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">
      {{ 'NAV.HOME' | translate }}
    </a>
    |
    <a routerLink="about" routerLinkActive="activo">
      {{ 'NAV.ABOUT' | translate }}
    </a>
    |
    <a routerLink="contact" routerLinkActive="activo">
      {{ 'NAV.CONTACT' | translate }}
    </a>
    @if (isLoggedIn()) {
      |
      <a routerLink="admin" routerLinkActive="activo">Admin</a>
    }
  </div>

  <div class="nav-actions">
    @if (isLoggedIn()) {
      <button type="button" class="session-btn" (click)="logout()">{{ 'NAV.LOGOUT' | translate }}</button>
    } @else {
      <button type="button" class="session-btn" (click)="goToLogin()">{{ 'NAV.LOGIN' | translate }}</button>
    }
  </div>
</nav>
